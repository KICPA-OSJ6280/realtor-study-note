<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>공인중개사 민법 학습카드</title>

  <!-- 디자인 파일 연결 -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <header class="header">
      <div>
        <p class="eyebrow">공인중개사 1차</p>
        <h1>민법 학습카드</h1>
        <p class="subtitle">비전공자도 이해할 수 있는 기출 중심 민법 정리</p>
      </div>

      <button id="darkModeBtn" class="dark-btn" type="button">
        다크모드
      </button>
    </header>

    <section class="overview-link">
      <a href="civil-overview.html">
        민법 전체 도식화 보기 →
      </a>
    </section>

    <section class="control-panel">
      <label for="searchInput" class="label">검색</label>
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="예: 비진의표시, 대리, 무효, 취소"
      />

      <div class="filter-area">
        <p class="label">단원 필터</p>

        <div class="filter-buttons">
          <button class="filter-btn active" type="button" data-chapter="전체">
            전체
          </button>

          <button class="filter-btn" type="button" data-chapter="민법총칙">
            민법총칙
          </button>

          <button class="filter-btn" type="button" data-chapter="물권법">
            물권법
          </button>

          <button class="filter-btn" type="button" data-chapter="계약법">
            계약법
          </button>

          <button class="filter-btn" type="button" data-chapter="민사특별법">
            민사특별법
          </button>
        </div>
      </div>
    </section>

    <section class="status-box">
      <span id="cardCount">카드 0개</span>
      <span>중요도 ★★★★★ 중심</span>
    </section>

    <main id="cardContainer" class="card-container">
      <!-- app.js가 여기에 학습카드를 자동으로 넣습니다 -->
    </main>
  </div>

  <script src="contract-law-cards.js"></script>
  <script src="special-civil-law-cards.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
